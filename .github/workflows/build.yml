name: Build & Package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---------- NativeAOT + UPX（最小体积，~5 MB）----------
          - rid: win-x64
            exe: cfst.exe
            os: windows-latest
            upx: true
            out: cfst-windows-x64-upx.exe
            container: ""
          - rid: linux-x64
            exe: cfst
            os: ubuntu-latest
            upx: true
            out: cfst-linux-glibc-x64-upx
            container: ""
          - rid: linux-musl-x64
            exe: cfst
            os: ubuntu-latest
            upx: true
            out: cfst-linux-musl-x64-upx
            container: ""
          - rid: linux-arm64
            exe: cfst
            os: ubuntu-24.04-arm
            upx: true
            out: cfst-linux-glibc-arm64-upx
            container: ""
          - rid: linux-musl-arm64
            exe: cfst
            os: ubuntu-24.04-arm
            upx: true
            out: cfst-linux-musl-arm64-upx
            container: ""
          # ---------- NativeAOT 无 UPX（~10 MB，杀软友好）----------
          - rid: win-x64
            exe: cfst.exe
            os: windows-latest
            upx: false
            out: cfst-windows-x64.exe
            container: ""
          - rid: linux-x64
            exe: cfst
            os: ubuntu-latest
            upx: false
            out: cfst-linux-glibc-x64
            container: ""
          - rid: linux-musl-x64
            exe: cfst
            os: ubuntu-latest
            upx: false
            out: cfst-linux-musl-x64
            container: ""
          - rid: linux-arm64
            exe: cfst
            os: ubuntu-24.04-arm
            upx: false
            out: cfst-linux-glibc-arm64
            container: ""
          - rid: linux-musl-arm64
            exe: cfst
            os: ubuntu-24.04-arm
            upx: false
            out: cfst-linux-musl-arm64
            container: ""
          - rid: osx-x64
            exe: cfst
            os: macos-15
            upx: false
            out: cfst-macos-x64
            container: ""
          - rid: osx-arm64
            exe: cfst
            os: macos-15
            upx: false
            out: cfst-macos-arm64
            container: ""

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
              assembly_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}.0"
            else
              echo "Invalid version tag: $GITHUB_REF_NAME" >&2
              exit 1
            fi
          else
            version="0.0.0-dev"
            assembly_version="0.0.0.0"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ASSEMBLY_VERSION=$assembly_version" >> "$GITHUB_ENV"

      # musl (Alpine) 容器：安装 build-base + clang + zlib-dev
      - name: Install musl build deps (Alpine)
        if: contains(matrix.container, 'alpine')
        run: apk add --no-cache build-base clang zlib-dev

      # glibc Linux：安装 AOT 依赖
      - name: Install AOT dependencies (Linux glibc)
        if: runner.os == 'Linux' && !contains(matrix.container, 'alpine')
        run: sudo apt-get install -y clang zlib1g-dev

      # UPX 安装（仅 upx=true 时安装）
      - name: Install UPX (Windows)
        if: matrix.upx == true && runner.os == 'Windows'
        run: choco install upx -y
        shell: pwsh

      - name: Install UPX (macOS)
        if: matrix.upx == true && runner.os == 'macOS'
        run: brew install upx

      # Linux upx 已预装，无需安装

      # musl 版本：用 docker run 在 Alpine 容器中构建（绕过 GitHub Actions JS actions 与 musl 不兼容问题）
      - name: Publish ${{ matrix.out }} [AOT${{ matrix.upx == true && '+UPX' || '' }}] (musl)
        if: contains(matrix.rid, 'musl')
        run: |
          docker run --rm -e VERSION="$VERSION" -e ASSEMBLY_VERSION="$ASSEMBLY_VERSION" -v "$PWD:/src" -w /src \
            mcr.microsoft.com/dotnet/sdk:8.0-alpine \
            sh -c '
              apk add --no-cache build-base clang zlib-dev upx
              dotnet publish CloudflareST.csproj -r ${{ matrix.rid }} -f net8.0 -c Release \
                -p:PublishAot=true \
                -p:Version="$VERSION" \
                -p:AssemblyVersion="$ASSEMBLY_VERSION" \
                -p:FileVersion="$ASSEMBLY_VERSION" \
                -p:InformationalVersion="$VERSION" \
                -p:StripSymbols=true \
                -o /src/publish/tmp/${{ matrix.out }}
              if [ "${{ matrix.upx }}" = "true" ]; then
                upx --best --lzma /src/publish/tmp/${{ matrix.out }}/${{ matrix.exe }}
              else
                echo "UPX skipped"
              fi
              # 将输出目录所有权改为 runner 用户，避免后续 cp 权限问题
              chown -R $(stat -c %u:%g /src) /src/publish/
            '
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      # glibc 版本：直接在 runner 上构建
      - name: Publish ${{ matrix.out }} [AOT${{ matrix.upx == true && '+UPX' || '' }}]
        if: '!contains(matrix.rid, ''musl'')'
        shell: bash
        run: |
          dotnet publish CloudflareST.csproj -r ${{ matrix.rid }} -f net8.0 -c Release \
            -p:PublishAot=true \
            -p:Version="$VERSION" \
            -p:AssemblyVersion="$ASSEMBLY_VERSION" \
            -p:FileVersion="$ASSEMBLY_VERSION" \
            -p:InformationalVersion="$VERSION" \
            -p:StripSymbols=true \
            -o publish/tmp/${{ matrix.out }}
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      # UPX 压缩（仅 upx=true 且非 musl；musl 版本已在容器内完成）
      - name: UPX compress ${{ matrix.out }}
        if: matrix.upx == true && !contains(matrix.rid, 'musl')
        shell: bash
        run: |
          exe_path="publish/tmp/${{ matrix.out }}/${{ matrix.exe }}"
          if command -v upx &>/dev/null; then
            upx --best --lzma "$exe_path" && echo "UPX done" || echo "UPX skipped (unsupported binary)"
          else
            echo "UPX not found, skipping"
          fi

      # 将最终产物复制到 publish/ 根目录并以 out 命名
      - name: Copy output to publish/${{ matrix.out }}
        shell: bash
        run: |
          src="publish/tmp/${{ matrix.out }}/${{ matrix.exe }}"
          dst="publish/${{ matrix.out }}"
          echo "src=$src"
          echo "dst=$dst"
          cp "$src" "$dst"

      - name: Upload artifact (${{ matrix.out }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: publish/${{ matrix.out }}
          compression-level: 0

  # 推送 tag 时创建 GitHub Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          # 每个 artifact 目录名就是最终文件名，直接复制
          find artifacts -maxdepth 2 -type f | while read f; do
            cp "$f" "release/"
          done
          chmod +x release/cfst-linux-glibc-x64 release/cfst-linux-glibc-x64-upx || true
          chmod +x release/cfst-linux-musl-x64 release/cfst-linux-musl-x64-upx || true
          chmod +x release/cfst-linux-arm64 release/cfst-linux-arm64-upx || true
          chmod +x release/cfst-linux-musl-arm64 release/cfst-linux-musl-arm64-upx || true
          chmod +x release/cfst-macos-x64 release/cfst-macos-arm64 || true

          create_package() {
            src="$1"
            target="$2"
            pkg="cfst-${target}"
            mkdir -p "release/pkg/${pkg}"
            cp "release/${src}" "release/pkg/${pkg}/cfst"
            chmod +x "release/pkg/${pkg}/cfst"
            printf '%s\n' "$VERSION" > "release/pkg/${pkg}/VERSION"
            test "$(cat "release/pkg/${pkg}/VERSION")" = "$VERSION"
            (cd release/pkg && tar -czf "../${pkg}.tar.gz" "${pkg}")
          }

          create_package "cfst-linux-glibc-x64" "linux-x64"
          create_package "cfst-linux-musl-x64" "linux-x64-musl"
          create_package "cfst-linux-glibc-arm64" "linux-arm64"
          create_package "cfst-linux-musl-arm64" "linux-arm64-musl"
          create_package "cfst-macos-x64" "macos-x64"
          create_package "cfst-macos-arm64" "macos-arm64"

          (cd release && sha256sum cfst-*.tar.gz > SHA256SUMS.txt)

          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          tag = os.environ["GITHUB_REF_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          release_dir = Path("release")
          assets = []
          for path in sorted(release_dir.glob("cfst-*.tar.gz")):
              data = path.read_bytes()
              assets.append({
                  "name": path.name,
                  "url": f"https://github.com/{repo}/releases/download/{tag}/{path.name}",
                  "size": len(data),
                  "sha256": hashlib.sha256(data).hexdigest(),
              })

          manifest = {
              "version": version,
              "releaseUrl": f"https://github.com/{repo}/releases/tag/{tag}",
              "notes": "",
              "checksumUrl": f"https://github.com/{repo}/releases/download/{tag}/SHA256SUMS.txt",
              "assets": assets,
          }
          (release_dir / "latest.json").write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/cfst-windows-x64-upx.exe
            release/cfst-linux-glibc-x64-upx
            release/cfst-linux-musl-x64-upx
            release/cfst-linux-glibc-arm64-upx
            release/cfst-linux-musl-arm64-upx
            release/cfst-windows-x64.exe
            release/cfst-linux-glibc-x64
            release/cfst-linux-musl-x64
            release/cfst-linux-glibc-arm64
            release/cfst-linux-musl-arm64
            release/cfst-macos-x64
            release/cfst-macos-arm64
            release/cfst-linux-x64.tar.gz
            release/cfst-linux-x64-musl.tar.gz
            release/cfst-linux-arm64.tar.gz
            release/cfst-linux-arm64-musl.tar.gz
            release/cfst-macos-x64.tar.gz
            release/cfst-macos-arm64.tar.gz
            release/SHA256SUMS.txt
            release/latest.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
