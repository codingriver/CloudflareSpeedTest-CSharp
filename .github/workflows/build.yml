name: Build & Package

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---------- NativeAOT + UPX（最小体积，~5 MB）----------
          - rid: win-x64
            exe: cfst.exe
            os: windows-latest
            upx: true
            out: cfst-windows-x64-upx.exe
          - rid: linux-x64
            exe: cfst
            os: ubuntu-latest
            upx: true
            out: cfst-linux-x64-upx
          # ---------- NativeAOT 无 UPX（~10 MB，杀软友好）----------
          # 注：macOS NativeAOT 输出为 Mach-O 格式，UPX 不支持压缩，故不提供 macOS UPX 包
          - rid: win-x64
            exe: cfst.exe
            os: windows-latest
            upx: false
            out: cfst-windows-x64.exe
          - rid: linux-x64
            exe: cfst
            os: ubuntu-latest
            upx: false
            out: cfst-linux-x64
          - rid: osx-x64
            exe: cfst
            os: macos-15
            upx: false
            out: cfst-macos-x64
          - rid: osx-arm64
            exe: cfst
            os: macos-15
            upx: false
            out: cfst-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # AOT 前置依赖
      - name: Install AOT dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y clang zlib1g-dev

      # UPX 安装（仅 upx=true 时安装）
      - name: Install UPX (Windows)
        if: matrix.upx == true && runner.os == 'Windows'
        run: choco install upx -y
        shell: pwsh

      - name: Install UPX (macOS)
        if: matrix.upx == true && runner.os == 'macOS'
        run: brew install upx

      # Linux upx 已预装，无需安装

      # 构建 NativeAOT（输出到临时目录避免与最终文件名冲突）
      - name: Publish ${{ matrix.out }} [AOT${{ matrix.upx == true && '+UPX' || '' }}]
        shell: bash
        run: |
          dotnet publish CloudflareST.csproj -r ${{ matrix.rid }} -c Release \
            -p:PublishAot=true \
            -p:StripSymbols=true \
            -o publish/tmp/${{ matrix.out }}
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      # UPX 压缩（仅 upx=true）
      - name: UPX compress ${{ matrix.out }}
        if: matrix.upx == true
        shell: bash
        run: |
          exe_path="publish/tmp/${{ matrix.out }}/${{ matrix.exe }}"
          if command -v upx &>/dev/null; then
            upx --best --lzma "$exe_path" && echo "UPX done" || echo "UPX skipped (unsupported binary)"
          else
            echo "UPX not found, skipping"
          fi

      # 将最终产物复制到 publish/ 根目录并以 out 命名
      - name: Copy output to publish/${{ matrix.out }}
        shell: bash
        run: |
          src="publish/tmp/${{ matrix.out }}/${{ matrix.exe }}"
          dst="publish/${{ matrix.out }}"
          echo "src=$src"
          echo "dst=$dst"
          cp "$src" "$dst"

      - name: Upload artifact (${{ matrix.out }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: publish/${{ matrix.out }}
          compression-level: 0

  # 推送 tag 时创建 GitHub Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          # 每个 artifact 目录名就是最终文件名，直接复制
          find artifacts -maxdepth 2 -type f | while read f; do
            cp "$f" "release/"
          done
          chmod +x release/cfst-linux-x64 release/cfst-linux-x64-upx || true
          chmod +x release/cfst-macos-x64 release/cfst-macos-arm64 || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/cfst-windows-x64-upx.exe
            release/cfst-linux-x64-upx
            release/cfst-windows-x64.exe
            release/cfst-linux-x64
            release/cfst-macos-x64
            release/cfst-macos-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
