name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # NativeAOT + UPX（需在对应系统构建，不可交叉编译）
          - rid: win-x64
            exe: cfst.exe
            os: windows-latest
            mode: aot
          - rid: linux-x64
            exe: cfst
            os: ubuntu-latest
            mode: aot
          - rid: osx-x64
            exe: cfst
            os: macos-13
            mode: aot
          - rid: osx-arm64
            exe: cfst
            os: macos-14
            mode: aot

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # AOT 前置依赖
      - name: Install AOT dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y clang zlib1g-dev

      # UPX 安装
      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y
        shell: pwsh

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      # Linux upx 已预装，无需安装

      # 构建 NativeAOT
      - name: Publish ${{ matrix.rid }} [AOT]
        shell: bash
        run: |
          dotnet publish CloudflareST.csproj -r ${{ matrix.rid }} -c Release \
            -p:PublishAot=true \
            -p:StripSymbols=true \
            -o publish/${{ matrix.rid }}
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      # UPX 压缩
      - name: UPX compress ${{ matrix.rid }}
        shell: bash
        run: |
          exe_path="publish/${{ matrix.rid }}/${{ matrix.exe }}"
          if command -v upx &>/dev/null; then
            upx --best --lzma "$exe_path" && echo "UPX done" || echo "UPX skipped (unsupported binary)"
          else
            echo "UPX not found, skipping"
          fi

      - name: Upload artifact (cfst-${{ matrix.rid }})
        uses: actions/upload-artifact@v4
        with:
          name: cfst-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/${{ matrix.exe }}

  # 推送 tag 时创建 GitHub Release
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/cfst-win-x64/cfst.exe   release/cfst-win-x64.exe
          cp artifacts/cfst-linux-x64/cfst      release/cfst-linux-x64
          cp artifacts/cfst-osx-x64/cfst        release/cfst-osx-x64
          cp artifacts/cfst-osx-arm64/cfst      release/cfst-osx-arm64
          chmod +x release/cfst-linux-x64 release/cfst-osx-x64 release/cfst-osx-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/cfst-win-x64.exe
            release/cfst-linux-x64
            release/cfst-osx-x64
            release/cfst-osx-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
