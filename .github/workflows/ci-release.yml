name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build Core and CLI
        run: |
          dotnet restore CloudflareST.Core/CloudflareST.Core.csproj
          dotnet restore CloudflareST.Cli/CloudflareST.Cli.csproj
          dotnet build CloudflareST.Core/CloudflareST.Core.csproj -c Release -v minimal
          dotnet build CloudflareST.Cli/CloudflareST.Cli.csproj -c Release -v minimal
      - name: Publish Core DLL
        run: |
          dotnet publish CloudflareST.Core/CloudflareST.Core.csproj -c Release -o publish/core
      - name: Publish CLI
        run: |
          dotnet publish CloudflareST.Cli/CloudflareST.Cli.csproj -c Release -o publish/cli
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloudflarest-release-artifacts
          path: publish/
