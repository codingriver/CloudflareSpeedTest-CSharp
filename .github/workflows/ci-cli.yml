name: CI - CLI Core
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore Core
        run: dotnet restore CloudflareST.Core/CloudflareST.Core.csproj
      - name: Restore CLI
        run: dotnet restore CloudflareST.Cli/CloudflareST.Cli.csproj
      - name: Build Core
        run: dotnet build CloudflareST.Core/CloudflareST.Core.csproj -c Release
      - name: Build CLI
        run: dotnet build CloudflareST.Cli/CloudflareST.Cli.csproj -c Release
      - name: Run Core unit tests (if any)
        run: dotnet test CloudflareST.Core/CloudflareST.Core.csproj -c Release --no-build || true
